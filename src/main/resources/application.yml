server:
  port: 8020
  tomcat:
    max-http-form-post-size: 524288000 # 请求最大：500M
    connection-timeout: 600s # 连接超时：600s
    keep-alive-timeout: 600s # 保持长连接:600s
    max-http-header-size: 102400 # 防止token值太大，无法传输。
spring:
  profiles:
    active: dev # 激活哪个配置，本地默认dev。上线时通过启动命令来改变配置，请勿直接更改此处配置
  application:
    name: edu # 项目名
  autoconfigure:
    exclude: com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure # 多数据源配置信息
  servlet:
    multipart:
      max-request-size: 500MB # 请求最大：500M
      max-file-size: 500MB # 上传文件最大：500M
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher # 用于解决springboot2.6.0以上版本和swagger2不兼容问题
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource # 连接池类型
    druid:
      stat-view-servlet:
        enabled: true # druid视图开关
      remove-abandoned: true #要求程序从池中get到连接后, N 秒后必须close,否则druid 会强制回收该连接,不管该连接中是活动还是空闲, 以防止进程不会进行close而霸占连接。
      remove-abandoned-timeout: 300 # 设置druid 强制回收连接的时限，当程序从池中get到连接开始算起，超过此值后，druid将强制回收该连接，单位秒。
      log-abandoned: true #当druid强制回收连接后，是否将stack trace 记录到日志中
      validation-query-timeout: 30 # 校验查询超时30秒
      transaction-query-timeout: 30 #事务超时30秒
      kill-when-socket-read-timeout: true #套接字读取超时时终止
      query-timeout: 30 # 查询超时30秒
      login-timeout: 30 # 登录超时30秒
      filters: stat,wall,config # 配置监控统计拦截的filters，去掉后监控界面sql无法进行统计。wall:防御sql注入 stat:监控统计
      max-active: 100 # 最大连接数
      initial-size: 1 # 初始化大小
      max-wait: 60000 # 获取连接等待超时时间（毫秒）
      min-idle: 1 # 最小连接数
      time-between-eviction-runs-millis: 60000 # 间隔多久才进行一次检测。检测需要关闭的空闲连接（毫秒）
      min-evictable-idle-time-millis: 300000 # 一个连接在池中最小生存的时间（毫秒）
      validation-query: select 'x'  # 用来检测连接是否有效的sql
      test-while-idle: true # 建议配置为true，不影响性能，并且保证安全性。申请连接的时候检测，如果空闲时间大于timeBetweenEvictionRunsMillis，执行validationQuery检测连接是否有效。 获取到了不可用的数据库连接，一般由应用处理异常。
      test-on-borrow: true # 申请连接时执行validationQuery检测连接是否有效,有消耗，但保证连接可用性
      test-on-return: false # 归还连接时执行validationQuery检测连接是否有效，做了这个配置会降低性能【出于性能考虑一般生产环境不开启】
      pool-prepared-statements: false  # 是否缓存preparedStatement，也就是PSCache。PSCache对支持游标的数据库性能提升巨大，比如说oracle。在mysql下建议关闭。
      keep-alive: false # 程序没有close连接且空闲时长超过 minEvictableIdleTimeMillis,则会执行validationQuery指定的SQL,以保证该程序连接不会池kill掉,其范围不超
    dynamic:
      primary: master
  redis:
    # 此处不适用jedis线程池，因为是非线程安全。如果出现多线程抢夺资源，redis串行操作数据异常。另外jedis连接数量过多，资源消耗阶梯式增大，连接成本就较高。
    lettuce:
      pool:
        max-active: 8 # 连接池最大连接数（使用负值表示没有限制）
        max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-idle: 8 # 连接池中的最大空闲连接
        min-idle: 0 # 连接池中的最小空闲连接
    timeout: 30000ms # 连接超时时间（毫秒）
  task:
    execution:
      pool:
        core-size: 10 # 核心线程，切勿设置过大，避免抢占所有服务器资源，导致其他服务无法正常执行业务逻辑
        max-size: 50 # 最大线程，切勿设置过大，避免抢占所有服务器资源，导致其他服务无法正常执行业务逻辑
        queue-capacity: 1000 # 等待队列数
  main:
    allow-circular-references: true # 打开循环引用
# mybatis-plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*/*Mapper.xml # mapper文件所在位置，注意，如果是放在src/main/java目录下 classpath:/com/your package/*/mapper/*Mapper.xml  如果是放在resource目录 classpath:/mapper/*Mapper.xml
  type-aliases-package: com.cui.edu.*.entity # 实体所在位置
  configuration:
    call-setters-on-nulls: true # 使用map接收返回值时，如果值为空则填充默认值：null，注意：如果没有此配置，为空的值会被过滤不返回。
    cache-enabled: true # 开启Mybatis二级缓存，默认为 true
    map-underscore-to-camel-case: true # 配置返回数据库(column下划线命名&&返回java实体是驼峰命名)，自动匹配无需as（没开启这个，SQL需要写as： select user_id as userId）
  global-config:
    db-config:
      table-underline: true # 驼峰下划线转换
      id-type: auto # id主键默认自增
    banner: true # 是否控制台 print mybatis-plus的LOGO
